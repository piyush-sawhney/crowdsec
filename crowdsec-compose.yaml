services:
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      GID: "${GID-1000}"
      UID: "${UID-1000}"
      # Collections to install on first boot
      COLLECTIONS: >-
        crowdsecurity/linux
        crowdsecurity/traefik
        crowdsecurity/sshd
        crowdsecurity/appsec-virtual-patching
        crowdsecurity/appsec-generic-rules
        crowdsecurity/base-http-scenarios
        crowdsecurity/http-cve
        crowdsecurity/whitelist-good-actors
      # Bouncer keys — set these in your .env file, never hardcode
      BOUNCER_KEY_traefik: "${CROWDSEC_TRAEFIK_KEY}"
      BOUNCER_KEY_firewall: "${CROWDSEC_FIREWALL_KEY}"
      TZ: Asia/Kolkata
      # Share threat intel with CrowdSec central API (requires enrollment)
      # Run: docker exec crowdsec cscli console enroll <your-key>
    volumes:
      # 1. Official Persistence (As required by docs)
      - crowdsec-db:/var/lib/crowdsec/data/
      - crowdsec-config:/etc/crowdsec/

      # 2. Acquisition configs (Injecting specific files into the volume)
      - ./configs/acquis/appsec.yaml:/etc/crowdsec/acquis.d/appsec.yaml:ro
      - ./configs/acquis/traefik.yaml:/etc/crowdsec/acquis.d/traefik.yaml:ro
      - ./configs/acquis/ssh.yaml:/etc/crowdsec/acquis.d/ssh.yaml:ro
      
      # 3. Profiles & Notifications
      # TIP: Instead of mounting the file directly to the root, 
      # many users mount custom profiles to a sub-folder if the engine supports it,
      # but for CrowdSec, mounting over the file is fine as long as the volume exists.
      - ./configs/profiles.yaml:/etc/crowdsec/profiles.yaml:ro
      - ./configs/notifications/telegram.yaml:/etc/crowdsec/notifications/http.yaml:ro

      # 4. Logs
      - traefik-logs:/var/log/traefik:ro
      - /var/log/auth.log:/var/log/auth.log:ro
      - /var/log/syslog:/var/log/syslog:ro
    tmpfs:
      - /tmp
      - /run
      - /var/log:mode=0755 # This creates a writable base for the log mount points
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Allows binding to privileged ports/network initialization
    expose:
      # LAPI — reachable by Traefik and local tools, but not exposed to the public
      - "8080"
      # AppSec engine — reachable by Traefik via shared network (no host port needed)
      - "7422"
    ports:
      # LAPI — localhost only, never expose publicly
      - "127.0.0.1:8081:8080"
    networks:
      - traefik-public
    # Prevent runaway resource usage during log-parse spikes
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "cscli", "metrics"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  crowdsec-db:
  crowdsec-config:
  traefik-logs:
    external: true  # Pre-existing volume created by Traefik — do not let Compose manage it

networks:
  traefik-public:
    external: true