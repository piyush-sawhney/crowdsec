services:
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      GID: "${GID:-1000}"
      UID: "${UID:-1000}"
      COLLECTIONS: >-
        crowdsecurity/linux
        crowdsecurity/traefik
        crowdsecurity/sshd
        crowdsecurity/appsec-virtual-patching
        crowdsecurity/appsec-generic-rules
        crowdsecurity/base-http-scenarios
        crowdsecurity/http-cve
        crowdsecurity/whitelist-good-actors
      BOUNCER_KEY_traefik: "${CROWDSEC_TRAEFIK_KEY}"
      BOUNCER_KEY_firewall: "${CROWDSEC_FIREWALL_KEY}"
      DISABLE_ONLINE_API: "false"
    volumes:
      # Acquisition configs
      - ./configs/acquis/appsec.yaml:/etc/crowdsec/acquis.d/appsec.yaml:ro
      - ./configs/acquis/traefik.yaml:/etc/crowdsec/acquis.d/traefik.yaml:ro
      - ./configs/acquis/ssh.yaml:/etc/crowdsec/acquis.d/ssh.yaml:ro
      # Profiles and notifications
      - ./configs/profiles.yaml:/etc/crowdsec/profiles.yaml:ro
      - ./configs/notifications/telegram.yaml:/etc/crowdsec/notifications/http.yaml:ro
      - ./data/config/online_api_credentials.yaml:/etc/crowdsec/online_api_credentials.yaml
      - ./data/config/local_api_credentials.yaml:/etc/crowdsec/local_api_credentials.yaml
      # Persistent state — db only, no full /etc/crowdsec mount
      - ./data/db:/var/lib/crowdsec/data/
      # Log sources
      - ${TRAEFIK_LOGS_PATH}:/var/log/traefik:ro
      - /var/log/auth.log:/var/log/auth.log:ro
    ports:
      - "127.0.0.1:8081:8080"
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  traefik-public:
    external: true